{% extends 'learning_logs/base.html' %}

{% block content %}
<div class="container-fluid justify-content-center bg-dark-0 shadow-lg p-4 my-2"
    style="background-color:  rgb(47, 50, 71);">
    <p><a href="{% url 'learning_logs:topic' topic.id%}">{{topic}}</a></p>
    <p>Add a new entry:</p>
    <div class="container-fluid justify-content-center bg-dark-0 shadow-lg p-4 my-2"
        style="background-color:  rgb(1, 34, 65);">
        <form action="{% url 'learning_logs:new_entry' topic.id %}" method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Add entry</button>
        </form>
    </div>
</div>
{% endblock content %}
