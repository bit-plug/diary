{% extends 'learning_logs/base.html' %}

{% block content %}
<div class="container-fluid justify-content-center bg-dark-0 shadow-lg p-4 my-2"
    style="background-color:  rgb(1, 34, 65);">
    <form action="{% url 'users:login' %}" method="post">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Log in</button>
        <input type="hidden" name="next" value="{% url 'learning_logs:index' %}">
    </form>
</div>
{% endblock content %}
